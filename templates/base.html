<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}테리크 지식인{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --brand: #e94560;
      --sidebar-bg: #0f172a;
      --sidebar-text: #94a3b8;
    }
    body { background: #f1f5f9; font-size: 14px; }

    /* ── 사이드바 ── */
    .sidebar {
      background: var(--sidebar-bg);
      min-height: 100vh;
      width: 220px;
      position: fixed;
      top: 0; left: 0;
      padding: 24px 16px;
      z-index: 100;
    }
    .sidebar .logo { color: var(--brand); font-weight: 700; font-size: 18px; margin-bottom: 28px; display: block; }
    .sidebar .nav-link {
      color: var(--sidebar-text);
      padding: 8px 12px;
      border-radius: 8px;
      display: flex; align-items: center; gap: 8px;
      transition: background .15s, color .15s;
      margin-bottom: 4px;
    }
    .sidebar .nav-link:hover, .sidebar .nav-link.active {
      background: rgba(255,255,255,.08);
      color: #fff;
    }
    .sidebar .nav-link.active { color: #fff; font-weight: 500; }

    /* ── 메인 콘텐츠 ── */
    .main { margin-left: 220px; padding: 28px 32px; }

    /* ── 공통 카드 ── */
    .card { border: none; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .card-header { background: white; border-bottom: 1px solid #f0f0f0; border-radius: 12px 12px 0 0 !important; padding: 14px 20px; }

    /* ── 뱃지 ── */
    .kw-badge { background: #e8f0fe; color: #1a73e8; font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }

    /* ── 테이블 ── */
    .table th { font-size: 12px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

    /* ── 스핀 애니메이션 ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin .8s linear infinite; }

    /* ── 마크다운 렌더 영역 ── */
    .guide-body h2 { font-size: 1rem; font-weight: 700; margin-top: 20px; color: #1e293b; }
    .guide-body h2:first-child { margin-top: 0; }
    .guide-body ul { padding-left: 20px; }
    .guide-body li { margin-bottom: 4px; }
    .guide-body p { margin-bottom: 8px; }
    .guide-body blockquote {
      background: #f8fafc; border-left: 3px solid var(--brand);
      padding: 12px 16px; border-radius: 0 8px 8px 0; margin: 12px 0;
    }

    /* ── 알림 배지 (상단) ── */
    .topbar-badge {
      background: var(--brand);
      color: white;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<!-- 사이드바 -->
<div class="sidebar">
  <a href="/" class="logo">
    <i class="bi bi-grid-3x3-gap-fill me-1"></i>테리크 지식인
  </a>
  <nav class="nav flex-column">
    <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
      <i class="bi bi-speedometer2"></i> 대시보드
    </a>
    <a href="/seed-questions" class="nav-link {% if request.path == '/seed-questions' %}active{% endif %}">
      <i class="bi bi-lightbulb"></i> 질문 생성기
    </a>
    <a href="/keywords" class="nav-link {% if request.path == '/keywords' %}active{% endif %}">
      <i class="bi bi-table"></i> 키워드 관리
    </a>
  </nav>

  <div style="position:absolute;bottom:24px;left:16px;right:16px;">
    <div style="background:rgba(255,255,255,.05);border-radius:8px;padding:12px;font-size:12px;color:#64748b;">
      <div style="color:#94a3b8;margin-bottom:4px;">스케줄</div>
      <div style="color:#cbd5e1;font-size:11px;line-height:1.8;">
        수집 매일 밤 11시<br>
        발송 매일 오전 9시<br>
        키워드 추천 매주 월요일
      </div>
    </div>
  </div>
</div>

<!-- 메인 -->
<div class="main">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show mb-3" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

<!-- 마크다운 렌더링 -->
<script>
  document.querySelectorAll('.render-md').forEach(el => {
    el.innerHTML = marked.parse(el.textContent || '');
  });
</script>

{% block scripts %}{% endblock %}
</body>
</html>
